name: Filter Health Check

on:
  schedule:
    # Daily at 08:00 UTC
    - cron: '0 8 * * *'
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  test:
    name: Instagram filter tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/package-lock.json

      - name: Install dependencies
        working-directory: tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests
        run: npx playwright install chromium --with-deps

      - name: Run filter tests
        working-directory: tests
        run: npx playwright test
        env:
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}

      # Always upload the HTML report so you can see what failed
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 14

      # Upload login-failed screenshot if login itself broke
      - name: Upload login failure screenshot
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: login-failed
          path: tests/login-failed.png
          retention-days: 7
