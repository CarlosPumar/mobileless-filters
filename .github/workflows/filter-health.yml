name: Filter Health Check

on:
  # Schedule paused — re-enable by uncommenting the lines below
  # schedule:
  #   - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  test:
    name: Filter tests (Instagram + YouTube)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/package-lock.json

      - name: Install dependencies
        working-directory: tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests
        run: npx playwright install chromium --with-deps

      # Restore Instagram session from secret so we never need headless login
      # (GitHub Actions IPs are blocked by Instagram's bot detection)
      # To regenerate: run `npm run setup` locally, then:
      #   base64 -i tests/auth.json | pbcopy
      # and update the INSTAGRAM_AUTH_JSON secret in GitHub.
      - name: Restore Instagram session
        if: ${{ secrets.INSTAGRAM_AUTH_JSON != '' }}
        working-directory: tests
        run: echo "${{ secrets.INSTAGRAM_AUTH_JSON }}" | base64 -d > auth.json

      - name: Run Instagram filter tests
        working-directory: tests
        run: npx playwright test
        env:
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}

      - name: Run YouTube filter tests
        working-directory: tests
        run: npx playwright test --config youtube/playwright.config.js

      # Always upload the HTML report so you can see what failed
      - name: Upload Instagram Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-instagram
          path: tests/playwright-report/
          retention-days: 14

      - name: Upload YouTube Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-youtube
          path: tests/youtube/playwright-report-youtube/
          retention-days: 14
